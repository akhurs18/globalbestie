<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Global Bestie Scraper</title>
  <style>
    body { font-family: 'Inter', sans-serif; width: 340px; padding: 15px; background: #FDFBF7; color: #130C10; margin: 0; }
    h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; text-align: center; margin-bottom: 15px; border-bottom: 1px solid #EBE5E5; padding-bottom: 10px; }
    label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; color: #9A8A8C; }
    input, select { width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #EBE5E5; border-radius: 4px; box-sizing: border-box; background: #fff; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button { width: 100%; padding: 12px; background: #130C10; color: #D4AF37; border: 1px solid #D4AF37; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; border-radius: 4px; }
    button:hover { background: #D4AF37; color: #130C10; }
    .preview-img { width: 100%; height: 120px; object-fit: contain; background: #fff; border: 1px dashed #EBE5E5; margin-bottom: 12px; border-radius: 4px; }
    .price-final-wrap { display: flex; align-items: center; justify-content: center; margin: 15px 0; font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: bold; color: #130C10; }
    .price-final-wrap span { margin-right: 8px; }
    .price-final-input { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: bold; color: #130C10; border: none; border-bottom: 2px solid #D4AF37; width: 120px; text-align: center; background: transparent; padding: 0; outline: none; margin: 0; }
    .status { text-align: center; font-size: 0.8rem; margin-top: 10px; min-height: 18px; }
    .success { color: #2E5E47; }
    .error { color: #B37D7D; }
  </style>
</head>
<body>
  <h2>Global Bestie Import</h2>
  
  <img id="preview" class="preview-img" src="" alt="No Image">
  
  <label>Product Title</label>
  <input type="text" id="title">

  <div class="grid">
    <div>
      <label>Brand</label>
      <input type="text" id="brand">
    </div>
    <div>
      <label>Category</label>
      <select id="cat">
        <option value="makeup">Makeup</option>
        <option value="skincare">Skincare</option>
        <option value="fragrance">Fragrance</option>
        <option value="fashion">Fashion</option>
      </select>
    </div>
  </div>

  <label>Description</label>
  <textarea id="description" rows="3" style="width:100%; border:1px solid #EBE5E5; border-radius:4px; margin-bottom:12px; font-size:0.75rem; padding:6px; font-family:'Inter',sans-serif; resize:vertical;"></textarea>

  <div class="grid">
    <div>
      <label>USD Price ($)</label>
      <input type="number" step="0.01" id="usdPrice" value="0">
    </div>
    <div>
      <label>Exchange Rate (PKR)</label>
      <input type="number" id="exchangeRate" value="280">
    </div>
  </div>

  <div class="grid">
    <div>
      <label>Shipping / Customs ($)</label>
      <input type="number" step="0.01" id="shipping" value="5">
    </div>
    <div>
      <label>Profit Margin (%)</label>
      <input type="number" id="margin" value="25">
    </div>
  </div>

  <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #EBE5E5;">
    <label>Supabase Service Role Key (Bypasses RLS)</label>
    <input type="password" id="serviceKey" placeholder="eyJh..." style="margin-bottom: 0;">
  </div>

  <div class="price-final-wrap">
    <span>PKR</span>
    <input type="number" id="finalPrice" class="price-final-input" value="0">
  </div>

  <button id="importBtn">Import to Supabase</button>
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
